services:
  - type: web_service
    name: django-backend
    env: python
    region: oregon
    branch: main
    plan: starter
    root: backend
    pythonVersion: "3.11"
    buildCommand: |
      pip install -r requirements.txt
      cd project && python manage.py collectstatic --noinput
    startCommand: cd project && gunicorn project.wsgi
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
