services:
  - type: web_service
    name: django-backend
    env: python
    region: oregon
    branch: main
    plan: starter
    root: backend/project
    pythonVersion: "3.11"
    buildCommand: |
      pip install -r ../requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn project.wsgi
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
